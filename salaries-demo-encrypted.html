<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Rindegastos · Salaries (Demo)</title>
<style>
:root{color-scheme:light}
*{box-sizing:border-box} body{margin:0;font-family:'Nunito Sans','Segoe UI',system-ui,Arial,sans-serif;background:#F6F9FE;color:#0C2340}
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#fff;border:1px solid #CFE0F2;border-radius:16px;max-width:380px;width:100%;padding:30px 28px;box-shadow:0 10px 30px rgba(2,39,89,.10);text-align:center}
.lock{width:46px;height:46px;border-radius:50%;background:#022759;color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:22px}
h1{font-size:18px;margin:0 0 4px;color:#022759}
p{font-size:13px;color:#5B7494;margin:0 0 18px}
input{width:100%;font-family:inherit;font-size:15px;padding:11px 12px;border:1.5px solid #CFE0F2;border-radius:9px;margin-bottom:10px}
input:focus{outline:none;border-color:#2E86C1}
button{width:100%;font-family:inherit;font-size:14px;font-weight:800;color:#fff;background:#022759;border:none;border-radius:9px;padding:12px;cursor:pointer}
button:hover{background:#0a3b7a}
.err{color:#D9534F;font-size:12.5px;font-weight:700;min-height:16px;margin-top:10px}
.foot{font-size:11px;color:#8A97A8;margin-top:16px}
</style></head>
<body>
<div class="gate" id="gate">
  <div class="box">
    <div class="lock">&#128274;</div>
    <h1>Rindegastos · Salaries (Demo)</h1>
    <p>This page is encrypted. Enter the password to view it.</p>
    <input id="pw" type="password" placeholder="Password" autofocus
      onkeydown="if(event.key==='Enter')go()"/>
    <button onclick="go()">Unlock</button>

</div>

const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function go(){
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err'); err.textContent = '';
  try{
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:b64d(P.salt), iterations:P.iter, hash:'SHA-256'},
      km, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64d(P.iv)}, key, b64d(P.ct));
    const html = new TextDecoder().decode(pt);
    document.open(); document.write(html); document.close();
  }catch(e){ err.textContent = 'Wrong password — try again.'; }
}
